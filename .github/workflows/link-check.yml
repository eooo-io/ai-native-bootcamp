name: Link check

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/link-check.yml'
      - 'lychee.toml'
  pull_request:
    paths:
      - '**.md'
      - '.github/workflows/link-check.yml'
      - 'lychee.toml'
  schedule:
    # Weekly on Monday 09:00 UTC — catches external links that rot
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --cache
            --max-cache-age 1d
            --no-progress
            './**/*.md'
          fail: true
          output: ./lychee-report.md

      - name: Create issue from broken links
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link check: broken links detected'
          content-filepath: ./lychee-report.md
          labels: |
            documentation
            link-check
